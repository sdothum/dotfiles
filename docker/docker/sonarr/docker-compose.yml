---
services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
      - LANG=en_US.UTF-8
      - LC_ALL=en_US.UTF-8
    volumes:
      - /var/lib/sonarr.docker:/config
      - /net/media/videos/series:/tv #optional
      - /net/downloads/nzbs/series:/downloads #optional
    ports:
      - 8989:8989
    restart: unless-stopped
